<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Job Application Tracker</title>
    <style>
        *{ font-family: "Outfit", sans-serif;}
    </style>
</head>
<body class="bg-[#fcf8f8]">

    <main class="w-[80%] mx-auto pt-16 ">

        <!-- job application tracker -->
        <div class="title font-bold text-4xl text-[#002C5C] mb-5 ">
            <h1>Job Application Tracker</h1>
        </div>

        <!-- job application tracker box -->
        <div class="tracker-card grid md:grid-cols-3 grid-cols-1 gap-4 mb-7">

            <div id="total" class="col-span-1 w-full h-[100px] rounded-lg border border-[#F1F2F4] p-5 bg-white">
                <p class="font-medium text-[#323B49]">Total</p>
                <p id="total-jobs" class="font-bold text-2xl">0</p>
            </div>

            <div id="interview" class="col-span-1 w-full h-[100px] rounded-lg border border-[#F1F2F4] p-5 bg-white">
                <p class="font-medium text-[#323B49]">Interview</p>
                <p class="font-bold text-2xl" id="total-interview">0</p>
            </div>

            <div id="rejected" class="col-span-1 w-full h-[100px] rounded-lg border border-[#F1F2F4] p-5 bg-white">
                <p class="font-medium text-[#323B49]">Rejected</p>
                <p class="font-bold text-2xl" id="total-rejected">0</p>
            </div>

        </div>

        <hr class="text-[#E6E7E9] mb-7">


        <section>

            <div class="flex justify-between mb-6">

                <h2 class="text-xl text-[#002C5C] font-semibold ">Available Jobs</h2>

                <p class="font-medium text-[#64748B]"> <span id="total-jobs2">0</span> jobs</p>

            </div>
            
            <!-- all interview & reject btn -->
            <div id="all-btn" class="flex gap-2 mb-4">
                
                <button onclick="toggleStyle('all-filter-btn')" class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-md bg-[#3B82F6] text-white" id="all-filter-btn">All</button>

                <button onclick="toggleStyle('interview-filter-btn')" class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-md" id="interview-filter-btn">Interview</button>

                <button onclick="toggleStyle('rejected-filter-btn')" class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-md" id="rejected-filter-btn">Rejected</button>

            </div>

        </section>
        
        <!-- card section -->
        <section id="all-job-card" class="space-y-4">

            <!-- card 1 -->
            <div class="job-card bg-white rounded-lg border border-[#F1F2F4] p-6">

            <div class="flex justify-between items-center mb-5">
                <div>
                    <h2 class="text-[#002C5C] font-semibold text-[18px]">Mobile First Corp</h2>
                    <p class="text-[#64748B]">React Native Developer</p>
                </div>
                
                <button class="btn btn-circle">
                    <img src="./Group 1.png" alt="" class="cursor-pointer">
                </button>
            </div>

            <p class="text-[#64748B] text-[14px] mb-5">Remote • Full-time • $130,000 - $175,000</p>

            <button class="btn btn-soft btn-primary text-[#002C5C] bg-[#EEF4FF] mb-2">Not Applied</button>

            <p class="text-[#323B49] text-[14px] mb-5">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>


            <button onclick="addToInterview(this)" class="btn btn-neutral btn-outline text-[#10B981] border-[#10B981] font-semibold mr-2">Interview</button>

            <button onclick="addToRejected(this)" class="btn btn-neutral btn-outline  text-[#EF4444] border-[#EF4444] font-semibold">Rejected</button>

            </div>

        </section>

    </main>
    <script src="./script/script.js"></script>
</body>
</html>
