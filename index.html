<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- tailwind & daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Job Application Tracker</title>
    <style>
        *{ font-family: "Outfit", sans-serif;}
    </style>
</head>
<body class="bg-[#fcf8f8] h-screen">
    <main class="w-[80%] mx-auto pt-16 ">

        <div class="title font-bold text-4xl text-[#002C5C] mb-5 ">
            <h1>Job Application Tracker</h1>
        </div>

        <div class="tracker-card grid md:grid-cols-3 grid-cols-1 gap-4 mb-7">

            <div class="total col-span-1 w-full h-[100px] rounded-lg border border-[#F1F2F4] p-5 bg-white">
                <p class="font-medium text-[#323B49]">Total</p>
                <p class="font-bold text-2xl">0</p>
            </div>

            <div class="interview col-span-1 w-full h-[100px] rounded-lg border border-[#F1F2F4] p-5 bg-white">
                <p class="font-medium text-[#323B49]">Interview</p>
                <p class="font-bold text-2xl">0</p>
            </div>

            <div class="rejected col-span-1 w-full h-[100px] rounded-lg border border-[#F1F2F4] p-5 bg-white">
                <p class="font-medium text-[#323B49]">Rejected</p>
                <p class="font-bold text-2xl">0</p>
            </div>

        </div>

        <hr class="text-[#E6E7E9] mb-7">


        <section>

            <div class="flex justify-between mb-6">
                <h2 class="text-xl text-[#002C5C] font-semibold ">Available Jobs</h2>
                <p class="font-medium text-[#64748B]">8 jobs</p>
            </div>

            <div class="all-btn flex gap-2 mb-4">
                <button class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-md bg-[#3B82F6] text-white">All</button>
                <button class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-md">Interview</button>
                <button class="btn btn-xs sm:btn-sm md:btn-md lg:btn-lg xl:btn-md">Rejected</button>
            </div>

        </section>
        
        <!-- card section -->
        <section class="all-card space-y-4">
            <div class="bg-white rounded-lg border border-[#F1F2F4] p-6">

            <div class="flex justify-between items-center mb-5">
                <div>
                    <h2 class="text-[#002C5C] font-semibold text-[18px]">Mobile First Corp</h2>
                    <p class="text-[#64748B]">React Native Developer</p>
                </div>
                
                <button class="btn btn-circle">
                    <img src="./Group 1.png" alt="" class="cursor-pointer">
                </button>
            </div>

            <p class="text-[#64748B] text-[14px] mb-5">Remote • Full-time • $130,000 - $175,000</p>

            <button class="btn btn-soft btn-primary text-[#002C5C] bg-[#EEF4FF] mb-2">Not Applied</button>

            <p class="text-[#323B49] text-[14px] mb-5">Build cross-platform mobile applications using React Native. Work on products used by millions of users worldwide.</p>


            <button class="btn btn-neutral btn-outline text-[#10B981] border-[#10B981] font-semibold mr-2">Interview</button>

            <button class="btn btn-neutral btn-outline  text-[#EF4444] border-[#EF4444] font-semibold">Rejected</button>

            </div>
        </section>

    </main>z
</body>
</html>
